name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm install
          npm run build

      - name: Checkout existing gh-pages
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages-existing
        continue-on-error: true

      - name: Archive previous version & build manifest
        run: |
          CURRENT_VER=$(node -e "console.log(require('./package.json').version)")
          CURRENT_DATE=$(date +"%Y-%m-%d")
          echo "Building version: $CURRENT_VER"

          mkdir -p dist/versions

          # Copy existing archived versions if they exist
          if [ -d gh-pages-existing/versions ]; then
            rsync -a --exclude='manifest.json' gh-pages-existing/versions/ dist/versions/ || true
          fi

          # Read previous manifest to get old current version
          PREV_VER=""
          PREV_LABEL=""
          PREV_DATE=""
          if [ -f gh-pages-existing/versions/manifest.json ]; then
            PREV_VER=$(node -e "try{const m=require('./gh-pages-existing/versions/manifest.json');console.log(m.current||'')}catch(e){console.log('')}")
            PREV_LABEL=$(node -e "try{const m=require('./gh-pages-existing/versions/manifest.json');console.log(m.currentLabel||m.current||'')}catch(e){console.log('')}")
            PREV_DATE=$(node -e "try{const m=require('./gh-pages-existing/versions/manifest.json');console.log(m.currentDate||'')}catch(e){console.log('')}")
          fi

          # Archive previous version's built files if version changed
          if [ -n "$PREV_VER" ] && [ "$PREV_VER" != "$CURRENT_VER" ]; then
            echo "Archiving previous version: $PREV_VER"
            mkdir -p "dist/versions/$PREV_VER"
            if [ -d gh-pages-existing ]; then
              # Copy all static files except versions/ dir
              rsync -a --exclude='versions' gh-pages-existing/ "dist/versions/$PREV_VER/" || true
            fi
          fi

          # Generate manifest.json
          node -e "
            const fs = require('fs');
            const MAX_ARCHIVED = 2;
            let archived = [];

            // Read existing archived from dist/versions
            const versionsDir = 'dist/versions';
            if (fs.existsSync(versionsDir)) {
              const entries = fs.readdirSync(versionsDir, { withFileTypes: true });
              for (const e of entries) {
                if (e.isDirectory()) {
                  archived.push({ id: e.name, label: e.name, date: '', path: 'versions/' + e.name + '/' });
                }
              }
            }

            // Merge with previous manifest's version dates
            const prevManifestPath = 'gh-pages-existing/versions/manifest.json';
            if (fs.existsSync(prevManifestPath)) {
              const prev = JSON.parse(fs.readFileSync(prevManifestPath, 'utf8'));
              for (const a of archived) {
                const found = (prev.versions || []).find(v => v.id === a.id);
                if (found) { a.label = found.label; a.date = found.date; }
                // Previous current archived now
                if (a.id === prev.current && prev.currentDate) a.date = prev.currentDate;
              }
            }

            // Trim to MAX_ARCHIVED (keep newest)
            archived.sort((a,b) => b.id.localeCompare(a.id));
            const toRemove = archived.slice(MAX_ARCHIVED);
            archived = archived.slice(0, MAX_ARCHIVED);

            // Remove old version directories
            for (const r of toRemove) {
              const p = 'dist/versions/' + r.id;
              if (fs.existsSync(p)) fs.rmSync(p, { recursive: true });
            }

            const manifest = {
              current: '$CURRENT_VER',
              currentLabel: '$CURRENT_VER',
              currentDate: '$CURRENT_DATE',
              versions: archived
            };
            fs.mkdirSync('dist/versions', { recursive: true });
            fs.writeFileSync('dist/versions/manifest.json', JSON.stringify(manifest, null, 2));
            console.log('Manifest:', JSON.stringify(manifest, null, 2));
          "

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          destination_dir: .
          keep_files: false
          exclude_assets: ''
          extra_files: dist/versions
